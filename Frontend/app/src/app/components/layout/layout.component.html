<div class="layout-wrapper">
  <app-header (toggleSidebar)="toggleSidebar()" class="header-area shadow-sm"></app-header>

  <div class="content-wrapper">
    <app-sidebar [ngClass]="{'collapsed': !showSidebar }" class="sidebar-area"></app-sidebar>
    
    <main [ngClass]="{ 'expanded': !showSidebar }" class="main-content">
      <div class="p-4">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <app-footer class="footer-area border-top"></app-footer>
</div>
