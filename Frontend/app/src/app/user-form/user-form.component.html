<div class="fondo-login d-flex flex-column justify-content-center align-items-center min-vh-100 w-100 p-3">
  
  <div class="mb-4 text-center animate__animated animate__fadeInDown">
    <h5 class="text-white fw-light mb-3">¿Tienes dudas o necesitas soporte?</h5>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="#" class="btn btn-outline-light btn-sm rounded-pill px-3">
        <i class="bi bi-facebook me-1"></i> Facebook
      </a>
      <a href="#" class="btn btn-outline-success btn-sm rounded-pill px-3 bg-white text-success">
        <i class="bi bi-whatsapp me-1"></i> WhatsApp
      </a>
      <a href="tel:+18006818824" class="btn btn-outline-light btn-sm rounded-pill px-3">
        <i class="bi bi-telephone me-1"></i> Soporte
      </a>
    </div>
  </div>

  <div class="card shadow-lg p-4" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-4">
      <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-block p-3 mb-2">
        <i class="bi bi-shield-lock-fill fs-1"></i>
      </div>
      <h2 class="fw-bold text-dark">Academia Betshalom</h2>
      <p class="text-muted">Administración Escolar</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="mb-3">
        <label for="usuario" class="form-label fw-bold small text-secondary">Usuario</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
          <input type="text" id="usuario" name="usuario" class="form-control bg-light border-start-0" 
                 placeholder="Ej: admin_betshalom" required
                 [(ngModel)]="user.usuario" #usuario="ngModel" 
                 [class.is-invalid]="usuario.invalid && usuario.touched" />
          <div *ngIf="usuario.invalid && usuario.touched" class="invalid-feedback">
            Ingresa tu nombre de usuario.
          </div>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label fw-bold small text-secondary">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
          <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" 
                 class="form-control bg-light border-start-0 border-end-0"
                 placeholder="••••••••" required [(ngModel)]="user.contrasenia" #password="ngModel"
                 [class.is-invalid]="password.invalid && password.touched" />
          <span class="input-group-text bg-light border-start-0" (click)="togglePasswordVisibility()">
            <i [ngClass]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </span>
          <div *ngIf="password.invalid && password.touched" class="invalid-feedback">
            La contraseña es obligatoria.
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 shadow-sm" [disabled]="loginForm.invalid">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
      </button>

      <div class="mt-4 text-center">
        <a href="#" class="text-decoration-none small fw-bold">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>

  <footer class="mt-5 text-center text-white-50" style="font-size: 0.8rem;">
    &copy; 2026 Academia Betshalom. Todos los derechos reservados.<br>
    Sistema de Control Estudiantil v2.0
  </footer>
</div>
